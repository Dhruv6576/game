<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Color Memory Game - Multiplayer Edition</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --secondary: #f093fb;
            --success: #00d4ff;
            --danger: #ff6b6b;
            --bg: #0f0f1e;
            --surface: #1a1a2e;
            --surface-light: #16213e;
            --text: #eaeaea;
            --text-muted: #a0a0a0;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            background: linear-gradient(135deg, var(--bg) 0%, #1e0a3e 100%);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-attachment: fixed;
        }

        #root {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 15px;
            overflow: hidden;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            0% { 
                opacity: 0; 
                transform: scale(0.5) rotateY(180deg);
            }
            50% { transform: scale(1.05); }
            100% { 
                opacity: 1; 
                transform: scale(1) rotateY(0deg);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 30px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 0 60px rgba(240, 147, 251, 0.6); }
        }

        @keyframes countdown {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes timeWarn {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 107, 107, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 107, 107, 0.7); }
        }

        .screen-wrapper {
            width: 100%;
            max-width: 1200px;
            height: 100%;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.6s ease-out;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
        }

        .modal {
            background: rgba(0, 0, 0, 0.7);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            animation: slideUp 0.3s ease-out;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-light) 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
            animation: slideUp 0.4s ease-out;
        }

        .modal-content h2 {
            font-size: 2em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-content p {
            color: var(--text-muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            border: 2px solid rgba(102, 126, 234, 0.3);
            background: rgba(102, 126, 234, 0.1);
            border-radius: 10px;
            color: var(--text);
            font-size: 1em;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(102, 126, 234, 0.2);
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px 24px;
            margin: 10px;
        }

        .btn-secondary:hover {
            background: rgba(102, 126, 234, 0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
            flex-shrink: 0;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .online-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--success);
            flex-shrink: 0;
            font-size: 0.9em;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 2px;
        }

        .modes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .mode-card {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-light) 100%);
            padding: 25px;
            border-radius: 15px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        .mode-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
            transform: translateY(-5px);
        }

        .mode-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        .mode-card h3 {
            font-size: 1.2em;
            margin-bottom: 8px;
        }

        .mode-card p {
            color: var(--text-muted);
            font-size: 0.85em;
        }

        .game-info {
            background: var(--surface);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(102, 126, 234, 0.2);
            flex-shrink: 0;
        }

        .game-info h2 {
            color: var(--primary);
            margin: 0 0 10px 0;
            font-size: 1.2em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 10px;
        }

        .stat-item {
            background: rgba(102, 126, 234, 0.1);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75em;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.5em;
            color: var(--success);
            font-weight: bold;
            margin-top: 3px;
        }

        .timer-display {
            font-size: 2.5em;
            color: var(--success);
            font-weight: bold;
            animation: countdown 1s ease-in-out infinite;
        }

        .timer-display.warning {
            color: var(--danger);
            animation: timeWarn 0.5s ease-in-out infinite;
        }

        .matchmaking {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .matchmaking h2 {
            margin: 0;
            font-size: 1.8em;
        }

        .matchmaking-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .finding-text {
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 2s ease infinite;
            font-size: 1.2em;
        }

        /* Player Found Animation */
        .player-found-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
            gap: 20px;
        }

        .player-found-content {
            text-align: center;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .player-found-content h1 {
            font-size: 2.5em;
            margin: 0 0 15px 0;
            background: linear-gradient(135deg, var(--success) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 2s ease-in-out infinite;
        }

        .player-found-content .opponent-name {
            font-size: 1.5em;
            color: var(--success);
            margin: 10px 0;
            font-weight: bold;
        }

        .player-found-content p {
            font-size: 1em;
            color: var(--text-muted);
            margin: 0;
        }

        .countdown-timer {
            font-size: 3.5em;
            color: var(--secondary);
            font-weight: bold;
            animation: countdown 1s ease-in-out infinite;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 320px;
            margin: 15px auto;
            flex-shrink: 0;
        }

        .box {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            user-select: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
            min-height: 60px;
        }

        .box:hover {
            transform: scale(0.98);
        }

        .box.active {
            transform: scale(0.85);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.3), 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .box.red { background: linear-gradient(135deg, #FF6B6B 0%, #ee5a52 100%); }
        .box.blue { background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%); }
        .box.green { background: linear-gradient(135deg, #45B7D1 0%, #2A7FAA 100%); }
        .box.yellow { background: linear-gradient(135deg, #FFA07A 0%, #FF8C42 100%); }

        .game-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .text-center { text-align: center; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            #root {
                padding: 10px;
            }

            .header {
                padding: 10px;
                gap: 10px;
            }

            .header h1 {
                font-size: 1.4em;
            }

            .online-badge {
                font-size: 0.8em;
                padding: 6px 12px;
            }

            .modes-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .mode-card {
                padding: 15px;
            }

            .mode-icon {
                font-size: 2em;
            }

            .game-board {
                max-width: 280px;
                gap: 8px;
            }

            .player-found-content h1 {
                font-size: 2em;
            }

            .player-found-content .opponent-name {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const COLORS = ['red', 'blue', 'green', 'yellow'];
        const MAX_GAME_LEVEL = 5; // Win condition: reach level 5
        
        function App() {
            // Check if player already has a name saved
            const savedName = localStorage.getItem('playerName');
            const [screen, setScreen] = useState(savedName ? 'mode' : 'name');
            const [playerName, setPlayerName] = useState(savedName || '');
            const [playerId, setPlayerId] = useState('');
            const [onlineCount, setOnlineCount] = useState(0);
            const [currentMode, setCurrentMode] = useState(null);
            const [matchmakingStatus, setMatchmakingStatus] = useState('');
            const [opponentName, setOpponentName] = useState('');
            const [inMatchmaking, setInMatchmaking] = useState(false);
            const [matchFoundCountdown, setMatchFoundCountdown] = useState(0);
            const [levelCountdown, setLevelCountdown] = useState(0);
            const [gameTimer, setGameTimer] = useState(0);
            const socketRef = useRef(null);

            const [gameState, setGameState] = useState({
                level: 1,
                sequence: [],
                userSequence: [],
                playing: false,
                score: 0,
                instruction: 'Watch the boxes!'
            });
            const [opponentCompleted, setOpponentCompleted] = useState(false);
            const [playerCompleted, setPlayerCompleted] = useState(false);
            const [bothPlayersReady, setBothPlayersReady] = useState(false);
            const [levelAlreadyEmitted, setLevelAlreadyEmitted] = useState(false);
            const [sequencePlayingRef, setSequencePlaying] = useState(false);
            const [gameResult, setGameResult] = useState(null); // 'win', 'lose', 'tie'
            const [leaderboardData, setLeaderboardData] = useState(null); // {winner, loser, winnerScore, loserScore}

            // Ref to track if countdown was initialized (prevents infinite re-init loop)
            const countdownInitializedRef = useRef(false);
            const sequenceRequestedRef = useRef(false);

            // Auto-start game and request first sequence when entering game screen
            useEffect(() => {
                console.log('📋 Auto-start effect - screen:', screen, 'sequence.length:', gameState.sequence.length, 'mode:', currentMode, 'alreadyRequested:', sequenceRequestedRef.current);
                if (screen === 'game' && !gameState.sequence.length && !sequenceRequestedRef.current) {
                    console.log('✅ Requesting new sequence for level', gameState.level);
                    if (currentMode !== 'solo' && socketRef.current && socketRef.current.connected) {
                        console.log('📤 Emitting generateSequence for multiplayer');
                        sequenceRequestedRef.current = true;
                        socketRef.current.emit('generateSequence');
                    } else if (currentMode === 'solo') {
                        console.log('📤 Calling generateSequence for solo');
                        sequenceRequestedRef.current = true;
                        setTimeout(() => {
                            generateSequence();
                        }, 500);
                    }
                } else if (levelAlreadyEmitted && !gameState.sequence.length) {
                    console.log('⚠️ Level already emitted but no sequence yet, waiting for sequenceReady...');
                }
            }, [screen, currentMode, gameState.sequence.length, gameState.level, levelAlreadyEmitted]);

            // Auto-transition if both players completed but server response is slow
            useEffect(() => {
                if (playerCompleted && opponentCompleted && !bothPlayersReady && screen === 'game') {
                    console.log('⏳ Both players completed, waiting for server to send bothPlayersReady...');
                    const timer = setTimeout(() => {
                        console.log('⚠️ Server response slow, manually setting bothPlayersReady');
                        setBothPlayersReady(true);
                        setLevelCountdown(5);
                    }, 2000);
                    return () => clearTimeout(timer);
                }
            }, [playerCompleted, opponentCompleted, bothPlayersReady, screen]);
            useEffect(() => {
                console.log('MatchFound useEffect running. screen:', screen, 'matchFoundCountdown:', matchFoundCountdown);
                
                if (screen !== 'matchFound') {
                    console.log('Screen is not matchFound, resetting initialization flag');
                    countdownInitializedRef.current = false;
                    return;
                }
                
                // Initialize countdown only on first entry (when matchFoundCountdown is still 0)
                if (!countdownInitializedRef.current && matchFoundCountdown === 0) {
                    console.log('First entry to matchFound, initializing countdown to 6');
                    countdownInitializedRef.current = true;
                    setMatchFoundCountdown(6);
                    return;
                }
                
                // When countdown naturally reaches 0 after being initialized, transition to game
                if (countdownInitializedRef.current && matchFoundCountdown === 0) {
                    console.log('Countdown reached 0, transitioning to game');
                    setScreen('game');
                    resetGameState();
                    setInMatchmaking(false);
                    return;
                }
                
                // If countdown is negative, also transition (safety check)
                if (matchFoundCountdown < 0) {
                    console.log('Countdown < 0, transitioning to game');
                    setScreen('game');
                    resetGameState();
                    setInMatchmaking(false);
                    return;
                }
                
                console.log('Starting timer, will decrement from', matchFoundCountdown);
                const timer = setTimeout(() => {
                    console.log('Timer fired, decrementing countdown');
                    setMatchFoundCountdown(prev => prev - 1);
                }, 1000);
                
                return () => clearTimeout(timer);
            }, [screen, matchFoundCountdown]);

            // Level countdown between levels
            useEffect(() => {
                console.log('🔄 Countdown effect - bothPlayersReady:', bothPlayersReady, 'levelCountdown:', levelCountdown, 'screen:', screen, 'currentLevel:', gameState.level);
                
                if (screen === 'game' && bothPlayersReady && levelCountdown > 0) {
                    console.log('⏱️ Starting countdown timer from', levelCountdown);
                    const timer = setTimeout(() => {
                        setLevelCountdown(prev => {
                            const next = prev - 1;
                            console.log('⏱️ Countdown tick:', next);
                            return next;
                        });
                    }, 1000);
                    return () => clearTimeout(timer);
                } else if (screen === 'game' && bothPlayersReady && levelCountdown === 0) {
                    // Countdown finished, advance to next level and request new sequence
                    console.log('⏱️ COUNTDOWN FINISHED! Current level:', gameState.level);
                    
                    setBothPlayersReady(false);
                    setPlayerCompleted(false);
                    setOpponentCompleted(false);
                    setLevelAlreadyEmitted(false); // Reset for next level
                    sequenceRequestedRef.current = false; // Reset request flag
                    setGameTimer(0);
                    setGameState(prev => ({ 
                        ...prev, 
                        level: prev.level + 1,
                        sequence: [],
                        userSequence: [],
                        playing: false,
                        instruction: 'Waiting for sequence...'
                    }));
                    setLevelCountdown(0);
                    
                    setTimeout(() => {
                        console.log('📤 Requesting generateSequence from server');
                        if (socketRef.current && socketRef.current.connected) {
                            socketRef.current.emit('generateSequence');
                        } else {
                            console.log('❌ Socket not connected!');
                        }
                    }, 500);
                }
            }, [screen, bothPlayersReady, levelCountdown, gameState.level]);

            // Game timer (time limit for each level)
            useEffect(() => {
                if (screen === 'game' && gameState.playing && gameTimer > 0) {
                    const timer = setTimeout(() => {
                        setGameTimer(gameTimer - 1);
                    }, 1000);
                    return () => clearTimeout(timer);
                } else if (screen === 'game' && gameState.playing && gameTimer === 0 && gameState.sequence.length > 0) {
                    // Time's up!
                    alert(`⏰ Time's Up!\n\nYour Score: ${gameState.score}`);
                    resetGameState();
                    setGameTimer(0);
                }
            }, [screen, gameState.playing, gameTimer, gameState.sequence.length, gameState.score]);

            useEffect(() => {
                try {
                    socketRef.current = io('http://localhost:3001', {
                        reconnection: true,
                        reconnectionDelay: 1000,
                        reconnectionAttempts: 3
                    });

                    // Auto-register if player name was previously saved
                    socketRef.current.on('connect', () => {
                        if (playerName && playerName.trim()) {
                            console.log('Socket connected, auto-registering player:', playerName);
                            socketRef.current.emit('register', { name: playerName });
                        }
                    });

                    socketRef.current.on('registered', (data) => {
                        setPlayerId(data.playerId);
                        setOnlineCount(data.onlineCount);
                    });

                    socketRef.current.on('onlineCount', (data) => {
                        setOnlineCount(data.count);
                    });

                    socketRef.current.on('matchmakingStatus', (data) => {
                        setMatchmakingStatus(data.message);
                    });

                    socketRef.current.on('matchFound', (data) => {
                        console.log('Match found:', data);
                        console.log('Setting matchFoundCountdown to 6...');
                        setOpponentName(data.opponentName);
                        setCurrentMode(data.mode);
                        setMatchmakingStatus('');
                        setScreen('matchFound');
                        setMatchFoundCountdown(6);
                        console.log('State setters called');
                    });

                    socketRef.current.on('opponentDisconnected', () => {
                        alert('Opponent disconnected!');
                        setScreen('mode');
                        setInMatchmaking(false);
                    });

                    // Multiplayer: receive sequence from server
                    socketRef.current.on('sequenceReady', (data) => {
                        console.log('📨 RECEIVED: sequenceReady', { level: data.level, sequenceLength: data.sequence.length, sequence: data.sequence });
                        const timeLimit = 3 + data.level * 2;
                        console.log('⏱️ Setting time limit:', timeLimit, 'for level', data.level);
                        setGameTimer(timeLimit);
                        setGameState(prev => ({
                            ...prev,
                            sequence: data.sequence,
                            userSequence: [],
                            playing: false,
                            instruction: 'Watch the boxes!'
                        }));
                        console.log('📥 Updated game state with new sequence, length:', data.sequence.length);
                        setSequencePlaying(true);
                        // Auto-play sequence after 2 seconds
                        setTimeout(() => {
                            console.log('▶️ Auto-starting sequence playback for', data.sequence.length, 'boxes');
                            playSequence(data.sequence, data.level);
                            setSequencePlaying(false);
                        }, 2000);
                    });

                    // Multiplayer: opponent completed level
                    socketRef.current.on('opponentLevelComplete', () => {
                        console.log('Opponent completed level');
                        setOpponentCompleted(true);
                    });

                    // Multiplayer: both players completed, showing countdown before next level
                    socketRef.current.on('bothPlayersReady', () => {
                        console.log('🎊 RECEIVED: bothPlayersReady event! Starting 5-second countdown');
                        setBothPlayersReady(true);
                        setLevelCountdown(5);
                    });

                    // Multiplayer: game has ended (someone won or tie)
                    socketRef.current.on('gameEnded', (data) => {
                        console.log('🏆 RECEIVED: gameEnded event', data);
                        const isWinner = data.winnerId === socket.id;
                        setGameResult(isWinner ? 'win' : data.isTie ? 'tie' : 'lose');
                        setLeaderboardData({
                            winner: data.winnerName,
                            loser: data.loserName,
                            winnerScore: data.winnerScore,
                            loserScore: data.loserScore,
                            isTie: data.isTie
                        });
                        setScreen('gameResult');
                    });
                } catch (e) {
                    console.log('Server not available, running in offline demo mode');
                }

                return () => {
                    socketRef.current?.disconnect();
                };
            }, []);

            const handleNameSubmit = () => {
                if (playerName.trim()) {
                    localStorage.setItem('playerName', playerName);
                    if (socketRef.current) {
                        socketRef.current.emit('register', { name: playerName });
                    }
                    setOnlineCount(Math.floor(Math.random() * 50) + 5);
                    setScreen('mode');
                }
            };

            const handleModeSelect = (mode) => {
                fullGameReset(); // Clear all old data first
                setCurrentMode(mode);
                if (mode === 'solo') {
                    setScreen('game');
                } else {
                    setInMatchmaking(true);
                    setScreen('matchmaking');
                    if (socketRef.current) {
                        socketRef.current.emit('findMatch', { mode });
                    } else {
                        console.log('Running in offline demo mode - simulating match');
                        setMatchmakingStatus('Waiting in queue (3 players)');
                        setTimeout(() => {
                            console.log('Demo: Match found - showing player found screen');
                            setOpponentName('Player ' + Math.floor(Math.random() * 1000));
                            setScreen('matchFound');
                            setMatchFoundCountdown(6);
                        }, 3000);
                    }
                }
            };

            const resetGameState = () => {
                setGameState({
                    level: 1,
                    sequence: [],
                    userSequence: [],
                    playing: false,
                    score: 0,
                    instruction: 'Watch the boxes!'
                });
                setLevelCountdown(0);
                setGameTimer(0);
            };

            const fullGameReset = () => {
                // Reset all game-related states
                resetGameState();
                // Reset multiplayer states
                setPlayerCompleted(false);
                setOpponentCompleted(false);
                setBothPlayersReady(false);
                setLevelAlreadyEmitted(false);
                setSequencePlaying(false);
                sequenceRequestedRef.current = false;
                countdownInitializedRef.current = false;
                // Reset opponent info
                setOpponentName('');
                // Reset game result
                setGameResult(null);
                setLeaderboardData(null);
                // Reset matchmaking
                setMatchFoundCountdown(0);
                setMatchmakingStatus('');
                setInMatchmaking(false);
            };

            const getTimeLimit = (level) => {
                return 3 + level * 2; // Level 1: 5s, Level 2: 7s, Level 3: 9s
            };

            const flashBox = (color) => {
                const box = document.querySelector(`.box.${color}`);
                if (box) {
                    box.classList.add('active');
                    try {
                        const audio = new Audio(`sounds/${color}.wav`);
                        audio.volume = 0.5;
                        audio.play().catch(() => {});
                    } catch (e) {}
                    
                    setTimeout(() => {
                        box.classList.remove('active');
                    }, 500);
                }
            };

            const generateSequence = () => {
                // In multiplayer, request sequence from server
                if (currentMode !== 'solo' && socketRef.current) {
                    console.log('Requesting sequence from server for multiplayer');
                    socketRef.current.emit('generateSequence');
                    return;
                }

                // Solo mode: generate locally
                const newSequence = [];
                for (let i = 0; i < gameState.level; i++) {
                    newSequence.push(COLORS[Math.floor(Math.random() * 4)]);
                }
                const timeLimit = getTimeLimit(gameState.level);
                setGameState(prev => ({ 
                    ...prev, 
                    sequence: newSequence, 
                    userSequence: [], 
                    playing: false, 
                    instruction: `Watch ${gameState.level} boxes!` 
                }));
                setGameTimer(timeLimit);
                playSequence(newSequence, gameState.level);
            };

            const playSequence = (sequence, level = gameState.level) => {
                console.log('🎬 playSequence called with:', { sequenceLength: sequence.length, level, sequence: sequence.toString() });
                let i = 0;
                function showNext() {
                    if (i < sequence.length) {
                        console.log(`  Flashing box ${i + 1}/${sequence.length}: ${sequence[i]}`);
                        flashBox(sequence[i]);
                        i++;
                        setTimeout(showNext, 700);
                    } else {
                        console.log('✅ Sequence playback complete, allowing clicks');
                        // After sequence finishes, wait 500ms before allowing clicks
                        const timeLimit = 3 + level * 2;
                        setGameTimer(timeLimit);
                        console.log('Sequence complete, setting playing to true after 500ms delay');
                        setTimeout(() => {
                            setGameState(prev => ({ ...prev, playing: true, instruction: 'Your turn! Click in order' }));
                        }, 500);
                    }
                }
                showNext();
            };

            const handleBoxClick = (color) => {
                if (!gameState.playing || gameTimer <= 0) {
                    console.log('❌ Click blocked - playing:', gameState.playing, 'timer:', gameTimer);
                    return;
                }

                console.log('🎯 Clicked:', color);
                flashBox(color);
                const newUserSequence = [...gameState.userSequence, color];
                const expectedColor = gameState.sequence[gameState.userSequence.length];

                if (color !== expectedColor) {
                    console.log('❌ Wrong color! Expected', expectedColor, 'got', color);
                    alert(`❌ Wrong! Game Over!\n\nYour Score: ${gameState.score}`);
                    resetGameState();
                    return;
                }

                console.log('✅ Correct!', newUserSequence.length, '/', gameState.sequence.length);
                setGameState(prev => ({ ...prev, userSequence: newUserSequence }));

                if (newUserSequence.length === gameState.sequence.length) {
                    const newScore = gameState.score + (gameState.level + 1) * 10;
                    console.log('🎉 LEVEL COMPLETE! Level', gameState.level, 'Score:', newScore);
                    setGameState(prev => ({
                        ...prev,
                        score: newScore,
                        playing: false,
                        instruction: '✓ Correct! Waiting for opponent...'
                    }));
                    setGameTimer(0);
                    setPlayerCompleted(true);
                    
                    if (currentMode !== 'solo') {
                        // Check if player reached max level (win condition)
                        if (gameState.level >= MAX_GAME_LEVEL) {
                            console.log('🏆 PLAYER REACHED MAX LEVEL! Level:', gameState.level, 'Max:', MAX_GAME_LEVEL);
                            // Notify server that this player won
                            if (socketRef.current && socketRef.current.connected) {
                                socketRef.current.emit('playerReachedMax', {
                                    level: gameState.level,
                                    score: newScore
                                });
                                console.log('📤 Sent playerReachedMax to server');
                            }
                            return; // Don't send levelComplete, wait for gameEnded event
                        }
                        
                        // Notify server that this player completed the level (only once per level)
                        if (socketRef.current && socketRef.current.connected && !levelAlreadyEmitted) {
                            console.log('📤 Sending levelComplete to server, level:', gameState.level, 'score:', newScore);
                            socketRef.current.emit('levelComplete', {
                                level: gameState.level,
                                score: newScore
                            });
                            console.log('✅ levelComplete emitted');
                            setLevelAlreadyEmitted(true);
                        } else if (!socketRef.current?.connected) {
                            console.log('❌ Socket not connected when trying to emit levelComplete');
                        } else if (levelAlreadyEmitted) {
                            console.log('⚠️ Level completion already emitted, skipping');
                        }
                    } else {
                        // Solo: auto-advance after 2 seconds
                        setTimeout(() => {
                            setGameState(prev => ({ ...prev, level: prev.level + 1 }));
                            generateSequence();
                        }, 2000);
                    }
                }
            };

            const handleCancelMatchmaking = () => {
                if (socketRef.current && inMatchmaking) {
                    socketRef.current.emit('cancelMatchmaking');
                }
                fullGameReset();
                setScreen('mode');
            };

            const backToMode = () => {
                fullGameReset();
                setScreen('mode');
            };

            // ===== NAME SCREEN =====
            if (screen === 'name') {
                return (
                    <div className="modal">
                        <div className="modal-content">
                            <h2>🎮 Color Memory</h2>
                            <p>Enter your in-game name to get started:</p>
                            <input
                                type="text"
                                placeholder="Your awesome name"
                                value={playerName}
                                onChange={(e) => setPlayerName(e.target.value)}
                                onKeyPress={(e) => e.key === 'Enter' && handleNameSubmit()}
                                maxLength="20"
                                autoFocus
                            />
                            <button className="btn-primary" onClick={handleNameSubmit}>
                                Start Playing
                            </button>
                        </div>
                    </div>
                );
            }

            // ===== MODE SELECTION =====
            if (screen === 'mode') {
                return (
                    <div className="screen-wrapper">
                        <div className="header">
                            <div>
                                <h1>🎮 Color Memory</h1>
                                <p style={{color: 'var(--text-muted)', margin: '5px 0 0 0', fontSize: '0.9em'}}>Welcome, <strong>{playerName}</strong>!</p>
                            </div>
                            <div className="online-badge">
                                <div className="online-dot"></div>
                                <span>{onlineCount} online</span>
                            </div>
                        </div>

                        <div className="content">
                            <div className="text-center" style={{marginBottom: '15px'}}>
                                <p style={{color: 'var(--text-muted)', fontSize: '0.95em'}}>Choose your game mode:</p>
                            </div>

                            <div className="modes-grid">
                                <div className="mode-card" onClick={() => handleModeSelect('solo')}>
                                    <div className="mode-icon">🎮</div>
                                    <h3>Solo Mode</h3>
                                    <p>Play alone & beat your best</p>
                                </div>

                                <div className="mode-card" onClick={() => handleModeSelect('multiplayer')}>
                                    <div className="mode-icon">⚡</div>
                                    <h3>Multiplayer</h3>
                                    <p>Compete with another player</p>
                                </div>

                                <div className="mode-card" onClick={() => handleModeSelect('dual')}>
                                    <div className="mode-icon">🎯</div>
                                    <h3>Dual Mode</h3>
                                    <p>Set patterns for each other</p>
                                </div>
                            </div>

                            <div style={{ textAlign: 'center', marginTop: '20px' }}>
                                <button className="btn-secondary" onClick={() => setScreen('leaderboard')}>
                                    📊 Leaderboards
                                </button>
                                <button className="btn-secondary" onClick={() => { 
                                    localStorage.removeItem('playerName');
                                    setPlayerName(''); 
                                    setScreen('name'); 
                                }}>
                                    👤 Change Name
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ===== MATCHMAKING =====
            if (screen === 'matchmaking') {
                return (
                    <div className="screen-wrapper">
                        <div className="header">
                            <h1>Finding Match...</h1>
                            <button className="btn-secondary" onClick={handleCancelMatchmaking}>Cancel</button>
                        </div>

                        <div className="content">
                            <div className="matchmaking">
                                <div className="matchmaking-spinner"></div>
                                <p className="finding-text">Finding player....</p>
                                <p style={{ color: 'var(--text-muted)' }}>{matchmakingStatus}</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // ===== PLAYER FOUND ANIMATION SCREEN =====
            if (screen === 'matchFound') {
                console.log('Rendering matchFound screen with countdown:', matchFoundCountdown);
                return (
                    <div className="player-found-overlay">
                        <div className="player-found-content">
                            <h1>✨ Player Found! ✨</h1>
                            <p>Playing against:</p>
                            <div className="opponent-name">{opponentName}</div>
                        </div>
                        <div className="countdown-timer">{matchFoundCountdown}</div>
                        <p style={{color: 'var(--text-muted)'}}>Game starts in {matchFoundCountdown} seconds...</p>
                    </div>
                );
            }

            // ===== LEVEL COUNTDOWN =====
            if (screen === 'game' && levelCountdown > 0) {
                return (
                    <div className="screen-wrapper">
                        <div className="header">
                            <h1>Next Level Starting...</h1>
                        </div>

                        <div className="content">
                            <div className="matchmaking">
                                <p style={{color: 'var(--text-muted)', fontSize: '1.1em'}}>Level {gameState.level + 1}</p>
                                <div className="countdown-timer">{levelCountdown}</div>
                            </div>
                        </div>
                    </div>
                );
            }

            // ===== GAME SCREEN =====
            if (screen === 'game') {
                const timeLimit = getTimeLimit(gameState.level);
                const timeWarning = gameTimer <= 3 && gameTimer > 0;
                
                return (
                    <div className="screen-wrapper">
                        <div className="header">
                            <div>
                                <h1>{currentMode === 'solo' ? 'Solo' : currentMode === 'multiplayer' ? 'Multiplayer' : 'Dual'} Mode</h1>
                                <p style={{color: 'var(--text-muted)', margin: '5px 0 0 0', fontSize: '0.9em'}}>{gameState.instruction}</p>
                            </div>
                            <button className="btn-secondary" onClick={backToMode}>← Back</button>
                        </div>

                        <div className="content">
                            <div className="game-info">
                                <h2>Level {gameState.level} | Score: {gameState.score}</h2>
                                <div className="stats-grid">
                                    <div className="stat-item">
                                        <div className="stat-label">Time Left</div>
                                        <div className={`stat-value ${timeWarning ? 'warning' : ''}`} style={{color: timeWarning ? 'var(--danger)' : 'var(--success)'}}>
                                            {gameTimer > 0 ? gameTimer : '—'}
                                        </div>
                                    </div>
                                    {currentMode !== 'solo' && <div className="stat-item">
                                        <div className="stat-label">Opponent</div>
                                        <div className="stat-value" style={{fontSize: '0.9em'}}>{opponentName}</div>
                                    </div>}
                                </div>
                            </div>

                            <div className="game-board">
                                {COLORS.map(color => (
                                    <div
                                        key={color}
                                        className={`box ${color}`}
                                        onClick={() => handleBoxClick(color)}
                                    />
                                ))}
                            </div>

                            <div className="game-controls">
                                {!gameState.sequence.length && gameTimer === 0 && currentMode === 'solo' && (
                                    <button className="btn-primary" style={{flex: 1, maxWidth: '250px'}} onClick={generateSequence}>
                                        Start Game
                                    </button>
                                )}
                                {currentMode !== 'solo' && !gameState.sequence.length && !bothPlayersReady && (
                                    <p style={{textAlign: 'center', color: 'var(--secondary)', fontSize: '1.1em'}}>Waiting for opponent...</p>
                                )}
                                {currentMode !== 'solo' && playerCompleted && !opponentCompleted && !bothPlayersReady && (
                                    <p style={{textAlign: 'center', color: 'var(--secondary)', fontSize: '1.1em'}}>✓ You completed! Waiting for opponent...</p>
                                )}
                                {bothPlayersReady && levelCountdown > 0 && (
                                    <div style={{textAlign: 'center'}}>
                                        <p style={{color: 'var(--success)', fontSize: '1.2em', marginBottom: '15px'}}>✓ Both players completed!</p>
                                        <p style={{color: 'var(--secondary)', fontSize: '1em', marginBottom: '10px'}}>Next level in:</p>
                                        <div className="countdown-timer" style={{fontSize: '3em'}}>{levelCountdown}</div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // ===== GAME RESULT SCREEN =====
            if (screen === 'gameResult' && leaderboardData) {
                const isWinner = gameResult === 'win';
                const isTie = gameResult === 'tie';
                
                return (
                    <div className="screen-wrapper">
                        <div className="header">
                            <h1>{isTie ? '🟰 It\'s a Tie!' : isWinner ? '🏆 You Won!' : '😢 You Lost'}</h1>
                        </div>

                        <div className="content">
                            <div style={{ 
                                background: 'var(--surface)', 
                                padding: '30px', 
                                borderRadius: '15px', 
                                border: `2px solid ${isTie ? 'var(--secondary)' : isWinner ? 'var(--success)' : 'var(--danger)'}`,
                                textAlign: 'center',
                                maxWidth: '400px',
                                margin: '0 auto'
                            }}>
                                <div style={{ marginBottom: '30px' }}>
                                    <h2 style={{ color: isWinner ? 'var(--success)' : isTie ? 'var(--secondary)' : 'var(--danger)', marginBottom: '10px', fontSize: isWinner ? '2em' : '1.5em' }}>
                                        {isWinner ? '✨' : '⭐'} {leaderboardData.winner} {isWinner ? '✨' : '⭐'}
                                    </h2>
                                    <p style={{ color: 'var(--text-muted)', fontSize: '0.9em' }}>{isWinner ? 'Winner' : 'Opponent'}</p>
                                    <p style={{ color: 'var(--success)', fontSize: '2em', margin: '10px 0', fontWeight: 'bold' }}>
                                        Score: {leaderboardData.winnerScore}
                                    </p>
                                </div>

                                <div style={{ borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: '20px', marginBottom: '20px' }}>
                                    <h3 style={{ color: 'var(--text-muted)', marginBottom: '10px', fontSize: '1em' }}>
                                        {isWinner ? 'Your' : leaderboardData.loser + '\'s'} Score
                                    </h3>
                                    <p style={{ color: isWinner ? 'var(--text-muted)' : 'var(--danger)', fontSize: '1.8em', margin: '10px 0', fontWeight: 'bold' }}>
                                        Score: {leaderboardData.loserScore}
                                    </p>
                                </div>

                                {isTie && (
                                    <div style={{ backgroundColor: 'rgba(240, 147, 251, 0.1)', padding: '15px', borderRadius: '10px', marginBottom: '20px' }}>
                                        <p style={{ color: 'var(--secondary)', fontSize: '1.1em', margin: '0' }}>
                                            Both players reached level {MAX_GAME_LEVEL}!
                                        </p>
                                    </div>
                                )}
                            </div>

                            <div style={{ textAlign: 'center', marginTop: '30px' }}>
                                <button 
                                    className="btn-primary" 
                                    onClick={() => {
                                        fullGameReset();
                                        setScreen('mode');
                                    }}
                                    style={{ maxWidth: '250px' }}
                                >
                                    Back to Menu
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // ===== LEADERBOARD =====
            if (screen === 'leaderboard') {
                return (
                    <div className="screen-wrapper">
                        <div className="header">
                            <h1>📊 Leaderboards</h1>
                            <button className="btn-secondary" onClick={() => setScreen('mode')}>← Back</button>
                        </div>

                        <div className="content">
                            <div style={{ background: 'var(--surface)', padding: '30px', borderRadius: '15px', border: '1px solid rgba(102, 126, 234, 0.2)', textAlign: 'center' }}>
                                <p style={{ color: 'var(--text-muted)' }}>🎮 Leaderboard coming soon! Play and share your scores!</p>
                            </div>
                        </div>
                    </div>
                );
            }
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
